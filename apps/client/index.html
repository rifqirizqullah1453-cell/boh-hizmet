<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo-boh.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/images/logo-boh.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2BC5D4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BÖH Hizmet" />
    <meta name="description" content="BÖH Hizmet - Platform layanan on-demand di Bartın, Türkiye." />
    <title>BÖH Hizmet</title>
    <style>
      #initial-loading {
        position: fixed; inset: 0; background: #F0FAFB;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 99999; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #initial-loading .spinner {
        width: 36px; height: 36px;
        border: 3px solid #D6E4F0; border-top-color: #2BC5D4;
        border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
      }
      #initial-loading .title { font-size: 18px; font-weight: 900; color: #0B1D35; margin-bottom: 4px; }
      #initial-loading .subtitle { font-size: 13px; font-weight: 600; color: #8899AA; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="initial-loading">
      <div class="spinner"></div>
      <div class="title">BÖH Hizmet</div>
      <div class="subtitle">Yükleniyor...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
