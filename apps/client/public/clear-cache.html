<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clearing Cache...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0C1D20; color: #E0F7F9; text-align: center; }
    .box { max-width: 400px; padding: 40px; }
    .spinner { width: 48px; height: 48px; border: 3px solid #1E3D42; border-top-color: #2BC5D4; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; color: #8FAFB3; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>Clearing cache...</h1>
    <p>Please wait while we remove old cached files.</p>
  </div>
  <script>
    (async function() {
      // 1. Unregister all service workers
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const reg of regs) {
          await reg.unregister();
        }
      }
      
      // 2. Delete all caches
      if ('caches' in window) {
        const names = await caches.keys();
        for (const name of names) {
          await caches.delete(name);
        }
      }
      
      // 3. Clear localStorage (demo data)
      localStorage.clear();
      
      // 4. Clear sessionStorage
      sessionStorage.clear();
      
      // 5. Redirect to app
      window.location.href = './';
    })();
  </script>
</body>
</html>
